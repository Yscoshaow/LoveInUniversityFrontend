<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>需要更新</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: #3b82f6;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      margin: 6px;
    }
    .btn-secondary {
      background: #e2e8f0;
      color: #475569;
    }
    .links {
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔄</div>
    <h1>需要更新浏览器内核</h1>
    <p>
      您的系统 WebView 版本过低，无法正常运行本应用。
      请更新 Android System WebView 或 Chrome 浏览器后重试。
    </p>
    <div class="links">
      <a class="btn" href="https://play.google.com/store/apps/details?id=com.google.android.webview" target="_blank">
        更新 WebView
      </a>
      <a class="btn btn-secondary" href="https://play.google.com/store/apps/details?id=com.android.chrome" target="_blank">
        更新 Chrome
      </a>
    </div>
    <p style="margin-top: 20px; font-size: 13px; color: #94a3b8;">
      华为设备：请在华为应用市场搜索「Android System WebView」进行更新
    </p>
  </div>
</body>
</html>
